<div class="view-section">
    <div id="wallets-main-view">
        <div id="wallets-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
            <!-- Dinámico -->
            <div class="card" onclick="promptNewWallet()" style="border: 1px dashed var(--border-light); display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255, 255, 255, 0.02);">
                <span style="color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;"><i class="fas fa-plus"></i> Nueva Billetera</span>
            </div>
        </div>
    </div>

    <!-- Detalle de Billetera (Oculto por defecto) -->
    <div id="wallet-detail-view" style="display: none;">
        <button onclick="hideWalletDetail()" class="btn-outline" style="margin-bottom: 24px; border: none; padding: 0; color: var(--accent-gold); display: flex; align-items: center; gap: 8px; font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">
            <i class="fas fa-arrow-left" style="font-size: 14px;"></i> Volver a mis billeteras
        </button>
        <div class="card" style="margin-bottom: 24px; border-left: 4px solid var(--accent-gold);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h4 style="color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px;" id="detail-wallet-name-label">Billetera</h4>
                    <h2 style="font-size: 32px; margin-top: 8px; font-weight: 800; color: #fff;" id="detail-wallet-balance">$0</h2>
                </div>
                <div style="display: flex; gap: 32px;">
                    <div style="text-align: right;">
                        <p style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Ingresos</p>
                        <p style="font-size: 20px; color: var(--accent-green); font-weight: 700;" id="detail-wallet-incomes">+$0</p>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Gastos</p>
                        <p style="font-size: 20px; color: var(--accent-red); font-weight: 700;" id="detail-wallet-expenses">-$0</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-title" style="color: var(--accent-gold); font-weight: 700;">HISTORIAL DE MOVIMIENTOS</div>
            
            <!-- Mini Barra de Filtros para Billetera -->
            <div class="wallet-filters" style="display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; background: rgba(255, 255, 255, 0.02); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color);">
                <div style="flex: 1; min-width: 120px;">
                    <label style="display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Fecha</label>
                    <input type="date" id="wallet-filter-date" class="btn-outline" style="width: 100%; padding: 6px; font-size: 13px;">
                </div>
                <div style="flex: 2; min-width: 180px;">
                    <label style="display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Descripción</label>
                    <input type="text" id="wallet-filter-desc" placeholder="Buscar..." class="btn-outline" style="width: 100%; padding: 6px; font-size: 13px;">
                </div>
                <div style="flex: 1; min-width: 120px;">
                    <label style="display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Categoría</label>
                    <select id="wallet-filter-category" class="btn-outline" style="width: 100%; padding: 6px; font-size: 13px;">
                        <option value="">Todas</option>
                    </select>
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button id="wallet-clear-filters" class="btn-outline" title="Limpiar Filtros" style="padding: 6px 10px;"><i class="fas fa-undo"></i></button>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;" id="table-wallet-details">
                    <thead>
                    <tr style="border-bottom: 1px solid var(--border-color); color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">
                        <th style="padding: 16px 12px;">Fecha</th>
                        <th>Descripción</th>
                        <th>Categoría</th>
                        <th>Monto</th>
                    </tr>
                    </thead>
                    <tbody style="color: #eee;">
                        <!-- Dinámico -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
